; SkyrimLoadingPercent — default settings.
; Configure in-game via the MCM (Mod Configuration Menu → Loading Percent).
; Enum indices (iAnimationStyle, iPosition, iPromptPosition) are 0-based.

[General]
; Animation: 0 Circle Fill, 1 Dragon Eye, 2 Nordic Runes, 3 Pixel Blocks,
; 4 Orbit Dots, 5 Compass Rose, 6 Snowflake, 7 Progress Bar,
; 8 Soul Gem, 9 Dwemer Cogs, 10 Shout, 11 Constellation, 12 Dragon Scales,
; 13 Enchantment, 14 Word Wall, 15 Standing Stone, 16 Twin Moons, 17 Daedric Portal,
; 18 Waveform, 19 Helix Spiral (18/19 are not lore-friendly; see bIncludeNonLoreAnims).
iAnimationStyle=0
; Cycle through the animations in random order, one full pass before any repeat
; (ignores iAnimationStyle when on).
bRandomStyle=0
; Let Random Style include Waveform and Helix Spiral (not lore-friendly). Has no
; effect on iAnimationStyle when manually picking an animation.
bIncludeNonLoreAnims=0
; Anchor: 0 Bottom-Right, 1 Bottom-Left, 2 Bottom-Center, 3 Top-Right, 4 Top-Left, 5 Top-Center.
iPosition=1
; Keep the loading screen at 100% until a key is pressed.
bHoldScreen=0
; Extra seconds to linger at 100% before closing (0 = off).
iLingerSeconds=0
; Prompt anchor: 0 Bottom-Right, 1 Bottom-Left, 2 Bottom-Center, 3 Top-Right, 4 Top-Left, 5 Center.
iPromptPosition=5
; Write each load's duration to Data/SKSE/Plugins/SkyrimLoadingPercent_times.log.
bLogLoadTimes=0

[Display]
bShowAnimation=1
bShowPercentage=1
; Animation size (0.2–3.0), 1.0 ≈ 1080p.
fScale=0.6
; Text size multiplier (0.3–3.0), independent of animation size.
fTextScale=0.45
; Opacity (0.1–1.0).
fOverlayAlpha=1.0
; Fine position nudge from the anchor, in 1280×720 stage units.
iOffsetX=0
iOffsetY=0
; Primary color as a decimal 0xAARRGGBB integer. 4292137150 = 0xFFD4D0BE (aged parchment).
iColor=4292137150
