; SkyrimLoadingPercent.ini
; Location: Data/SKSE/Plugins/SkyrimLoadingPercent.ini
; Press \ (backslash) in-game to open the live config menu.

[General]
; Which animation (0-9):
;   0 Circle Fill   1 Dragon Eye   2 Nordic Runes  3 Waveform    4 Pixel Blocks
;   5 Orbit Dots    6 Compass Rose 7 Helix Spiral  8 Snowflake   9 Progress Bar
iAnimationStyle=0

; Where the widget appears:
;   0 Bottom-Right (default)  1 Bottom-Left  2 Bottom-Center
;   3 Top-Right               4 Top-Left
iPosition=0

[Display]
; Show numeric percentage alongside the animation
bShowPercentage=true

; Widget size (0.2 tiny .. 1.0 normal .. 3.0 huge). Default 0.6 = corner-friendly.
fScale=0.6

; Primary colour as ARGB hex (default gold). Press \ in-game to use the colour picker.
; Examples: FFC8902A (gold)  FF5599CC (ice blue)  FFCC3322 (dragon red)
sColor=FFC8902A
