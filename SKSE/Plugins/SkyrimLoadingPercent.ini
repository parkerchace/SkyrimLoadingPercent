; SkyrimLoadingPercent.ini
; Configure in-game via the MCM (Pause → Mod Configuration → Loading Percent).
; The MCM writes its own overrides to Data/MCM/Settings/SkyrimLoadingPercent.ini,
; which take priority over this file. Edit here to change the built-in defaults.
; Enum indices (iAnimationStyle, iPosition, iPromptPosition) are 0-based.

[General]

; Which animation to show on loading screens (0–19).
;  0  Circle Fill      1  Dragon Eye       2  Nordic Runes
;  3  Pixel Blocks     4  Orbit Dots       5  Compass Rose
;  6  Snowflake        7  Progress Bar     8  Soul Gem
;  9  Dwemer Cogs     10  Shout           11  Constellation
; 12  Dragon Scales   13  Enchantment     14  Word Wall
; 15  Standing Stone  16  Twin Moons      17  Daedric Portal
; 18  Waveform        19  Helix Spiral
; (18/19 are not lore-friendly; see bIncludeNonLoreAnims. This setting is
; ignored when bRandomStyle=true)
iAnimationStyle=0

; Cycle through the animations in random order for each load screen — every
; animation plays once before any repeat. When true, iAnimationStyle is ignored.
bRandomStyle=false

; Let Random Style include Waveform and Helix Spiral (not lore-friendly, off by
; default). Has no effect on a manually-picked iAnimationStyle.
bIncludeNonLoreAnims=false

; Where the widget appears on screen.
;   0  Bottom-Right   1  Bottom-Left (default)   2  Bottom-Center
;   3  Top-Right      4  Top-Left                5  Top-Center
iPosition=1

; Keep the overlay on screen after the bar reaches 100% until you press a key (default false).
; A pulsing "Press any key to continue" prompt will appear while waiting.
bHoldScreen=false

; How many seconds to linger at 100% before the overlay automatically exits (0 = off).
; When combined with bHoldScreen, whichever condition clears first releases the screen —
; a key press dismisses early, or the timer releases without requiring input.
iLingerSeconds=0

; Where to draw the "Press any key to continue" prompt (only used when bHoldScreen=true).
; 0=Bottom-Right  1=Bottom-Left  2=Bottom-Center  3=Top-Right  4=Top-Left  5=Center
iPromptPosition=5

; Write each load's duration to Data/SKSE/Plugins/SkyrimLoadingPercent_times.log.
bLogLoadTimes=false

[Display]

; Show the animation widget (true / false).
; When false, the percentage is also hidden — only the "Press any key" prompt remains if holdScreen is on.
bShowAnimation=true

; Show numeric percentage alongside the animation (true / false).
bShowPercentage=true

; Widget size multiplier. 0.2 = tiny, 0.6 = default, 3.0 = huge.
fScale=0.6

; Percentage/prompt text size multiplier (0.3–3.0), independent of fScale.
fTextScale=0.45

; Widget opacity. 1.0 = fully opaque, lower lets Skyrim's art show through.
fOverlayAlpha=1.0

; Fine position nudge from the anchor, in 1280×720 stage units.
iOffsetX=0
iOffsetY=0

; Primary color as a decimal 0xAARRGGBB integer.
; 4292137150 = 0xFFD4D0BE (aged parchment, matching vanilla Skyrim UI).
; Examples:  4292137150 = parchment (0xFFD4D0BE)   4291334186 = gold (0xFFC8902A)   4283800012 = ice blue (0xFF5599CC)
iColor=4292137150
