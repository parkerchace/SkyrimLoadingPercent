; SkyrimLoadingPercent.ini
; Press \ (backslash) in-game to open the live settings menu.
; All values can be changed in-game — no restart needed.

[General]

; Which animation to show on loading screens (0-19).
;  1  Dragon Eye        2  Nordic Runes     3  Waveform
;  4  Pixel Blocks      5  Orbit Dots       6  Compass Rose
;  7  Helix Spiral      8  Snowflake        9  Progress Bar
; 10  Alchemy Cauldron 11  Dwemer Cogs     12  Aurora Borealis
; 13  Constellation    14  Dragon Scales   15  Enchantment
; 16  Word Wall        17  Standing Stone  18  Twin Moons
; 19  Blizzard Vortex
; (ignored when bRandomStyle=true)
iAnimationStyle=1

; Pick a different random animation for each load screen.
; When true, iAnimationStyle is ignored.
bRandomStyle=false

; Virtual key code for the menu toggle key.
; Default 220 = backslash on US/UK keyboards.
; Change this if backslash is mapped to your console key or requires an awkward combo.
; You can also rebind it live inside the menu itself.
; Common values: 220=\ (US)  121=F10  123=F12  119=F8  118=F7
iMenuKey=220

; Keep the overlay on screen after the bar reaches 100% until you press a key (default false).
; A pulsing "Press any key to continue" prompt will appear while waiting.
bHoldScreen=false

; How many seconds to linger at 100% before the overlay automatically exits (0 = off).
; Can be combined with bHoldScreen — both conditions must clear before the overlay hides.
iLingerSeconds=0

; Where to draw the "Press any key to continue" prompt (only used when bHoldScreen=true).
; 0=Bottom-Right  1=Bottom-Left  2=Bottom-Center  3=Top-Right  4=Top-Left  5=Center
iPromptPosition=5

; Where the widget appears on screen.
;   0  Bottom-Right (default)   1  Bottom-Left   2  Bottom-Center
;   3  Top-Right                4  Top-Left      5  Top-Center
iPosition=1

[Display]

; Show numeric percentage alongside the animation. (true / false)
bShowPercentage=true

; Widget size multiplier. 0.2 = tiny, 0.6 = default, 3.0 = huge.
fScale=0.6

; Widget opacity. 1.0 = fully opaque, lower lets Skyrim's art show through.
fOverlayAlpha=1.0

; Primary colour in RGB hex (no alpha prefix).
; Default FFD4D0BE = aged parchment, matching vanilla Skyrim UI.
; Use the colour picker in the \ menu or edit directly here.
; Examples:  FFD4D0BE (parchment)  FFC8902A (gold)  FF5599CC (ice blue)  FFCC3322 (dragon red)
sColor=FFD4D0BE

[Cache]

; Bytes read during the last completed load — written automatically, do not edit.
; Used so the progress bar is calibrated from the very first load of each session.
uLastStreamCount=0
